name: Release CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-ci:
    name: Validate release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"

    steps:
      - name: Checkout exact revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.34.5 --activate
          pnpm --version

      - name: Scan tracked public artifacts
        run: |
          node scripts/ci-public-artifact-scan.mjs --self-test
          node scripts/ci-public-artifact-scan.mjs

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm check

      - name: Run tests
        run: pnpm test

      - name: Build production release
        run: pnpm build

      - name: Enforce production bundle budget
        run: pnpm bundle:budget

      - name: Audit rendered trust claims
        run: pnpm governance:audit

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=moderate

      - name: Audit complete dependency graph
        run: pnpm audit --audit-level=moderate

      - name: Require reproducible generated files
        run: git diff --exit-code
