name: SEO Agent Heartbeat

on:
  schedule:
    # Daily at 9:15 AM UTC. Adjust later if Manus/GSC timing needs a different window.
    - cron: "15 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  seo-heartbeat:
    name: Run SEO heartbeat
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GSC_PROPERTY_URL: ${{ vars.GSC_PROPERTY_URL || 'sc-domain:breakyoursolarcontract.com' }}
      GSC_DATE_RANGE_DAYS: ${{ vars.GSC_DATE_RANGE_DAYS || '28' }}
      GSC_DATA_LAG_DAYS: ${{ vars.GSC_DATA_LAG_DAYS || '3' }}
      GSC_MAX_AGE_HOURS: ${{ vars.GSC_MAX_AGE_HOURS || '36' }}
      SEO_GSC_REQUIRE_FRESH: "true"
      SEO_GSC_STATUS_JSON: reports/seo-agent/gsc-status.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore prior heartbeat state
        uses: actions/cache@v4
        with:
          path: reports/seo-agent/state.json
          key: seo-heartbeat-state-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            seo-heartbeat-state-${{ runner.os }}-${{ github.ref_name }}-

      - name: Detect live GSC connection
        id: gsc_connection
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh live GSC Search Analytics
        if: steps.gsc_connection.outputs.configured == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: pnpm seo:gsc:refresh

      - name: Verify GSC measurement freshness
        id: gsc_status
        run: |
          pnpm seo:gsc:status -- --max-age-hours "$GSC_MAX_AGE_HOURS"
          USABLE="$(node -e "console.log(require('./reports/seo-agent/gsc-status.json').usable ? 'true' : 'false')")"
          echo "usable=$USABLE" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.gsc_connection.outputs.configured }}" = "true" ] && [ "$USABLE" != "true" ]; then
            echo "A configured GSC refresh did not produce a fresh, complete measurement snapshot." >&2
            exit 1
          fi

      - name: Run SEO agent
        run: pnpm seo:agent -- --base https://breakyoursolarcontract.com

      - name: Build indexing queue
        run: pnpm seo:indexing

      - name: Build CTR rescue queue
        run: pnpm seo:ctr
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Build internal-link opportunities
        run: pnpm seo:internal-links

      - name: Verify backlinks
        run: pnpm seo:backlinks

      - name: Build alert summary
        run: pnpm seo:alert-summary

      - name: Open or update SEO heartbeat issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          TITLE="SEO Agent Daily Heartbeat"
          BODY_FILE="reports/seo-agent/GITHUB_ISSUE.md"
          ACTION_REQUIRED="$(node -e "console.log(require('./reports/seo-agent/latest-alert-summary.json').actionRequired ? 'true' : 'false')")"

          if ! gh label list --repo "$REPO" --json name --jq '.[].name' | grep -qx "seo-agent"; then
            gh label create "seo-agent" --repo "$REPO" --color "1d76db" --description "Automated SEO agent alerts"
          fi

          if ! gh label list --repo "$REPO" --json name --jq '.[].name' | grep -qx "automated"; then
            gh label create "automated" --repo "$REPO" --color "ededed" --description "Created by automation"
          fi

          ISSUE_NUMBER="$(gh issue list --repo "$REPO" --state open --label "seo-agent" --search "$TITLE in:title" --json number --jq '.[0].number // empty')"

          if [ "$ACTION_REQUIRED" != "true" ]; then
            if [ -n "$ISSUE_NUMBER" ]; then
              gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "Daily SEO heartbeat is clean. Closing this alert issue."
              gh issue close "$ISSUE_NUMBER" --repo "$REPO" --comment "Closed automatically because the SEO heartbeat reported no action required."
            fi
            exit 0
          fi

          if [ -z "$ISSUE_NUMBER" ]; then
            gh issue create --repo "$REPO" --title "$TITLE" --label "seo-agent" --label "automated" --body-file "$BODY_FILE"
          else
            gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --body-file "$BODY_FILE"
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "Daily SEO heartbeat completed. The issue body has been refreshed with the latest audit and indexing queue."
          fi

      - name: Upload SEO evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-heartbeat-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            reports/seo-agent/
            gsc_all_pages.json
            gsc_report.csv
            gsc_data_metadata.json
